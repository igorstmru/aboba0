<!DOCTYPE html>
<html>
<head>
</head>
<body>
    <p>Вы будете перенаправлены через <span id="timer">1</span> секунд.</p>
    <script>
        let seconds = 1;
        const timerElement = document.getElementById('timer');
        const interval = setInterval(() => {
            seconds--;
            timerElement.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = "https://st-ru.notion.site/36d4af974bd98068a33ee3d246ee672f";
            }
        }, 1000);
    </script>
</body>
</html>
