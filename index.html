<!DOCTYPE html>
<html>
<head>
</head>
<body>
    <p>Вы будете перенаправлены через <span id="timer">3</span> секунд.</p>
    <script>
        let seconds = 3;
        const timerElement = document.getElementById('timer');
        const interval = setInterval(() => {
            seconds--;
            timerElement.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = "https://st-ru.notion.site/3574af974bd980248528e044531c41b8";
            }
        }, 1000);
    </script>
</body>
</html>
